
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vassal (Alpha)</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>

<style>
body{
  margin:0;
  background:#202020;
  font-family:Arial;
  color:white;
  overflow:hidden;
}

canvas{
  image-rendering: pixelated;
}

#game-container{
  position:relative;
  left:16px;
  top:16px;
  bottom:16px;
  right:300px;
}

#game-container canvas{
  cursor:pointer;
}

#sidepanel{
  position:absolute;
  background:#202020;
  right:0;
  top:0;
  bottom:0;
  width:270px;
  padding:16px;
  display:flex;
  flex-direction:column;
}

#minimap{
  border:1px solid #555;
  margin-bottom:16px;
  image-rendering:pixelated;
  cursor:pointer;
}

.debug{
  margin-top:auto;
  padding:8px;
  background:#444;
  border:none;
  color:white;
  cursor:pointer;
}

#debugButtons{
 margin-top:auto;
 display:flex;
 flex-direction:column;
 gap:8px;
}

#tileinfo{
  font-size:14px;
}

#unitActions{
 position:absolute;
 left:24px;
 bottom:24px;

 width:128px;
 height:128px;

 background:#808080;
 box-shadow:4px 4px 0px #000;
 z-index:1000;

 image-rendering:pixelated;

 display:grid;
 grid-template-columns:repeat(3, 32px);
 grid-template-rows:repeat(3, 32px);
 gap:4px;

 justify-content:center;
 align-content:center;
}

#unitActions button{
  width:32px;
  height:32px;
  background:#404040;
  color:white;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  margin:0;
  padding:0;
}

#turnBox{
 position:absolute;
 top:24px;
 left:24px;
 background:#404040;
 color:white;
 padding:6px 12px;
 font-family:monospace;
 font-size:16px;
 border:2px solid black;
 box-shadow:2px 2px 0px black;

}

</style>
</head>

<body>

<div id="game-container"></div>

<!----
<div id="unitActions">
  <button>&nwarr;</button>
  <button>&uarr;</button>
  <button>&nearr;</button>
  <button>&larr;</button>
  <button>&orarr;</button>
  <button>&rarr;</button>
  <button>&swarr;</button>
  <button>&darr;</button>
  <button>&searr;</button>
</div>
-->

<div id="turnBox">
 Turn: <span id="turnNumber">1</span>
</div>

<div id="sidepanel">
<canvas id="minimap"></canvas>

<div id="tileinfo">
    <img id="unitIcon" style="cursor:pointer; display:none; width:64px; height:64px;float:left; margin-right:8px;">
    <div id="tiletext"></div>
</div>

<div id="debugButtons">
  <button class="debug"id="exploreAll">Explore All</button>
  <button class="debug" id="toggleVeg">Hide Vegetation</button>
  <button class="debug" id="regen">Regenerate World</button>
</div>
</div>

<script src="engine/state.js"></script>
<script src="engine/worldgen.js"></script>
<script src="engine/renderer.js"></script>
<script src="engine/minimap.js"></script>
<script src="engine/camera.js"></script>
<script src="engine/input.js"></script>
<script src="engine/population.js"></script>
<script src="engine/ai.js"></script>
<script src="main.js"></script>

</body>
</html>
