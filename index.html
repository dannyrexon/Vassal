
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vassal (Alpha)</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>

<style>
body{
  margin:0;
  background:#202020;
  font-family:Arial;
  color:white;
  overflow:hidden;
}

canvas{
  image-rendering: pixelated;
}

#game-container{
  position:relative;
  left:16px;
  top:16px;
  bottom:16px;
  right:300px;
}

#game-container canvas{
  cursor:pointer;
}

#sidepanel{
  position:absolute;
  background:#202020;
  right:0;
  top:0;
  bottom:0;
  width:270px;
  padding:16px;
  display:flex;
  flex-direction:column;
}

#minimap{
  border:1px solid #555;
  margin-bottom:16px;
  image-rendering:pixelated;
  cursor:pointer;
}

.debug{
  margin-top:auto;
  padding:8px;
  background:#444;
  border:none;
  color:white;
  cursor:pointer;
}

#debugButtons{
 margin-top:auto;
 display:flex;
 flex-direction:column;
 gap:8px;
}

#tileinfo{
  font-size:14px;
}

#unitActions{
 position:absolute;
 left:24px;
 bottom:24px;

 width:128px;
 height:128px;

 background:#808080;
 box-shadow:4px 4px 0px #000;
 z-index:1000;

 image-rendering:pixelated;

 display:grid;
 grid-template-columns:repeat(3, 32px);
 grid-template-rows:repeat(3, 32px);
 gap:4px;

 justify-content:center;
 align-content:center;
}

#unitActions button{
  width:32px;
  height:32px;
  background:#404040;
  color:white;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  margin:0;
  padding:0;
}

#turnBox{
 position:absolute;
 top:24px;
 left:24px;
 background:#404040;
 color:white;
 padding:6px 12px;
 font-family:monospace;
 font-size:16px;
 border:2px solid black;
 box-shadow:2px 2px 0px black;

}

#modalOverlay{
 position:absolute;
 top:0;
 left:0;
 width:100%;
 height:100%;
 display:none;
 z-index:1500;
 pointer-events:all;
}

#combatDialog{
 position:absolute;
 top:50%;
 left:50%;
 transform:translate(-50%,-50%);
 width:420px;
 background:#2b2b2b;
 border:3px solid black;
 box-shadow:4px 4px 0px #000;
 padding:12px;
 z-index:2000;
 color:white;
 font-family:monospace;
 display:none;
}

#combatTitle{
 text-align:center;
 font-size:18px;
 margin-bottom:10px;
}

#combatUnits{
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.combatSide{
 width:140px;
 text-align:center;
}

.unitName{
 font-size:14px;
 margin-bottom:6px;
}

.unitHP{
 font-size:14px;
 margin-bottom:4px;
 color:#ffd700;
}

.unitIcon{
 position:relative;
 width:64px;
 height:64px;
 margin:0 auto;
 transition: opacity 0.5s ease;
}

.iconBase,
.iconFlash{
 position:absolute;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background-image:url("graphics/population.png");
 image-rendering:pixelated;
}

/* hidden by default */
.iconFlash{
 opacity:0;
 filter: brightness(0) invert(1); /* turns sprite white */
 pointer-events:none;
}

.unitStats{
 margin-top:6px;
 font-size:12px;
}

#combatVS{
 font-weight:bold;
}

#combatActions{
 margin-top:12px;
 display:flex;
 justify-content:space-between;
 height:40px;
}

#combatActions button{
 width:48%;
 height:32px;
 background:#404040;
 color:white;
 border:2px solid black;
 font-family:monospace;
 cursor:pointer;
}

#fightBtn{
 background:#7a2b2b;
}

#fightBtn:hover{
 background:#a33b3b;
}

#cancelBtn:hover{
 background:#606060;
}

</style>
</head>

<body>

<div id="modalOverlay"></div>

<div id="game-container"></div>

<!----
<div id="unitActions">
  <button>&nwarr;</button>
  <button>&uarr;</button>
  <button>&nearr;</button>
  <button>&larr;</button>
  <button>&orarr;</button>
  <button>&rarr;</button>
  <button>&swarr;</button>
  <button>&darr;</button>
  <button>&searr;</button>
</div>
-->

<div id="turnBox">
 Turn: <span id="turnNumber">1</span>
</div>

<div id="sidepanel">
<canvas id="minimap"></canvas>

<div id="tileinfo">
    <img id="unitIcon" style="cursor:pointer; display:none; width:64px; height:64px;float:left; margin-right:8px;">
    <div id="tiletext"></div>
</div>

<div id="debugButtons">
  <button class="debug"id="exploreAll">Explore All</button>
  <button class="debug" id="toggleVeg">Hide Vegetation</button>
  <button class="debug" id="regen">Regenerate World</button>
</div>
</div>

<div id="combatDialog">

 <div id="combatTitle">Combat</div>

 <div id="combatUnits">

  <div class="combatSide" id="attackerSide">
   <div class="unitName" id="attackerName"></div>
   <div class="unitHP" id="attackerHP"></div>
   <div class="unitIcon" id="attackerIcon">
    <div class="iconBase"></div>
    <div class="iconFlash"></div>
   </div>
   <div class="unitStats" id="attackerStats"></div>
  </div>

  <div id="combatVS">VS</div>

  <div class="combatSide" id="defenderSide">
   <div class="unitName" id="defenderName"></div>
   <div class="unitHP" id="defenderHP"></div>
   <div class="unitIcon" id="defenderIcon">
    <div class="iconBase"></div>
    <div class="iconFlash"></div>
   </div>
   <div class="unitStats" id="defenderStats"></div>
  </div>

 </div>

 <div id="combatActions">
  <button id="fightBtn">Fight</button>
  <button id="cancelBtn">Cancel</button>
 </div>

</div>

<script src="globals.js"></script>
<script src="engine/ui.js"></script>
<script src="engine/state.js"></script>
<script src="engine/worldgen.js"></script>
<script src="engine/renderer.js"></script>
<script src="engine/minimap.js"></script>
<script src="engine/camera.js"></script>
<script src="engine/input.js"></script>
<script src="engine/population.js"></script>
<script src="engine/ai.js"></script>
<script src="main.js"></script>

</body>
</html>
